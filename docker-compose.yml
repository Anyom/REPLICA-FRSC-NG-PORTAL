version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: frsc_user
      POSTGRES_PASSWORD: frsc_password_dev
      POSTGRES_DB: frsc_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - frsc-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      NODE_ENV: development
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: frsc_user
      DB_PASSWORD: frsc_password_dev
      DB_NAME: frsc_db
      PORT: 5000
    ports:
      - '5000:5000'
    depends_on:
      - postgres
    networks:
      - frsc-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:5000
    ports:
      - '3000:3000'
    depends_on:
      - backend
    networks:
      - frsc-network

volumes:
  postgres_data:

networks:
  frsc-network:
    driver: bridge
